name: Weekly OSM refresh → PR

# Fetches latest OSM tennis/padel courts, regenerates courts-db.json via
# consolidate.js, and opens a PR. Does NOT auto-merge — human review.

on:
  schedule:
    - cron: '0 4 * * 1'   # Every Monday at 4am UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch courts from Overpass API
        run: |
          QUERY='[out:json][timeout:60];(node["sport"="tennis"](40.47,-74.05,40.93,-73.68);way["sport"="tennis"](40.47,-74.05,40.93,-73.68);node["sport"="padel"](40.47,-74.05,40.93,-73.68);way["sport"="padel"](40.47,-74.05,40.93,-73.68););out center tags;'
          curl -s --max-time 90 --retry 3 --retry-delay 10 \
            --data-urlencode "data=${QUERY}" \
            https://overpass-api.de/api/interpreter \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(json.dumps(d['elements']))" \
            > courts.json
          echo "Fetched $(python3 -c "import json; print(len(json.load(open('courts.json'))))") elements"

      - name: Regenerate courts-db.json
        run: node consolidate.js

      - name: Open PR if either file changed
        uses: peter-evans/create-pull-request@v6
        with:
          branch: osm-weekly-refresh
          commit-message: "chore: weekly OSM refresh"
          title: "Weekly OSM refresh"
          body: |
            Automated weekly refresh. Review the diff on `courts-db.json`
            (the file the app actually loads) — added/removed pins will show
            as JSON-array changes.

            If a previously deleted court reappears (e.g. OSM editor
            restored a mis-tag), add its OSM id to `blocked_ids` in
            `curated-courts.json` and re-run `node consolidate.js` locally
            before merging.
          add-paths: |
            courts.json
            courts-db.json
