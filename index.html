<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NYC Tennis & Padel Courts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    #map { height: 100vh; width: 100%; }

    /* ── Panel ───────────────────────────────────────────── */
    #panel {
      position: absolute;
      top: 16px; left: 16px;
      z-index: 1000;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.12), 0 1px 4px rgba(0,0,0,.08);
      width: 264px;
      max-height: calc(100vh - 32px);
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: #e2e8f0 transparent;
    }
    #panel::-webkit-scrollbar { width: 4px; }
    #panel::-webkit-scrollbar-track { background: transparent; }
    #panel::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 2px; }

    #panel-header {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
      color: white;
      padding: 18px 18px 16px;
      border-radius: 16px 16px 0 0;
      position: sticky; top: 0; z-index: 1;
    }
    #panel-header .header-icon { font-size: 22px; margin-bottom: 6px; display: block; }
    #panel-header h2 { font-size: 16px; font-weight: 700; letter-spacing: -.01em; margin-bottom: 3px; }
    #panel-header p  { font-size: 11px; opacity: .55; letter-spacing: .02em; }

    #panel-body { padding: 16px 16px 18px; }

    .section-label {
      font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .08em;
      color: #94a3b8; margin: 16px 0 8px;
    }
    .section-label:first-child { margin-top: 0; }

    /* Address input */
    #address-wrap { display: flex; flex-direction: column; gap: 7px; }
    #address-input {
      width: 100%; padding: 9px 11px; font-size: 12.5px;
      font-family: inherit;
      border: 1.5px solid #e2e8f0; border-radius: 8px; outline: none;
      background: #f8fafc; color: #1e293b;
      transition: border-color .15s, background .15s;
    }
    #address-input::placeholder { color: #94a3b8; }
    #address-input:focus { border-color: #6366f1; background: #fff; }
    #address-btn {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white; border: none;
      padding: 9px 12px; border-radius: 8px;
      font-size: 12.5px; font-weight: 600; font-family: inherit;
      cursor: pointer; letter-spacing: .01em;
      transition: opacity .15s, transform .1s;
    }
    #address-btn:hover  { opacity: .9; transform: translateY(-1px); }
    #address-btn:active { transform: translateY(0); }
    #address-btn:disabled { background: #cbd5e1; cursor: wait; transform: none; }
    #address-clear {
      font-size: 11.5px; color: #64748b; cursor: pointer;
      display: none; text-align: center;
      padding: 2px 0;
    }
    #address-clear:hover { color: #1e293b; }
    #address-status { font-size: 11px; color: #64748b; min-height: 14px; }
    #address-status.error { color: #ef4444; }
    #address-status.ok    { color: #22c55e; font-weight: 500; }

    /* Time pills */
    .time-pills { display: flex; gap: 5px; }
    .time-pill {
      flex: 1; padding: 5px 0; font-size: 11.5px; font-weight: 600;
      font-family: inherit; cursor: pointer;
      border: 1.5px solid #e2e8f0; border-radius: 6px;
      background: #f8fafc; color: #64748b;
      transition: all .15s;
    }
    .time-pill:hover  { border-color: #a5b4fc; color: #4f46e5; }
    .time-pill.active { background: #4f46e5; border-color: #4f46e5; color: white; }

    /* Active drive filter banner */
    #drive-active-banner {
      display: none; font-size: 11px; color: #4338ca;
      background: #eef2ff; border-radius: 6px;
      padding: 5px 9px; line-height: 1.4;
    }

    /* Filter rows */
    .filter-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 8px; cursor: pointer;
      padding: 2px 0;
    }
    .filter-row input[type="checkbox"] {
      width: 15px; height: 15px; cursor: pointer; flex-shrink: 0;
      accent-color: #4f46e5;
    }
    .filter-row label {
      display: flex; align-items: center; gap: 9px;
      font-size: 13px; font-weight: 400; cursor: pointer;
      color: #334155; line-height: 1.2;
    }
    .swatch {
      width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
      box-shadow: 0 1px 3px rgba(0,0,0,.2);
    }

    .divider { height: 1px; background: #f1f5f9; margin: 14px 0; }

    /* Stats grid */
    #stats-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; margin-bottom: 10px;
    }
    .stat-card {
      background: #f8fafc; border-radius: 8px; padding: 8px 10px;
      border: 1px solid #f1f5f9;
    }
    .stat-card .stat-val { font-size: 18px; font-weight: 700; color: #0f172a; line-height: 1; }
    .stat-card .stat-lbl { font-size: 10px; color: #94a3b8; margin-top: 3px; font-weight: 500; text-transform: uppercase; letter-spacing: .05em; }
    #stat-total { grid-column: 1 / -1; background: linear-gradient(135deg,#f0f9ff,#e0f2fe); border-color: #bae6fd; }
    #stat-total .stat-val { color: #0369a1; }

    #access-stats { font-size: 11.5px; color: #64748b; line-height: 2; }

    #hint {
      font-size: 11px; color: #94a3b8; margin-top: 12px;
      line-height: 1.6; padding: 8px 10px;
      background: #f8fafc; border-radius: 8px;
    }

    /* ── Zoom controls ───────────────────────────────────── */
    #zoom-controls {
      position: absolute;
      right: 16px; bottom: 32px;
      z-index: 1000;
      display: flex; flex-direction: column; gap: 4px;
    }
    .zoom-btn {
      width: 40px; height: 40px;
      background: white;
      border: none; border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
      font-size: 20px; font-weight: 300; color: #334155;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .15s, transform .1s, box-shadow .15s;
      font-family: inherit;
    }
    .zoom-btn:hover  { background: #f8fafc; box-shadow: 0 4px 12px rgba(0,0,0,.18); transform: translateY(-1px); }
    .zoom-btn:active { transform: translateY(0); box-shadow: 0 1px 4px rgba(0,0,0,.12); }

    /* ── Loading overlay ─────────────────────────────────── */
    #loading {
      position: absolute; inset: 0;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(4px);
      z-index: 2000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #e2e8f0;
      border-top-color: #4f46e5;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: 14px; color: #475569; font-weight: 500; }

    /* ── Leaflet popup overrides ─────────────────────────── */
    .leaflet-popup-content-wrapper {
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.15), 0 1px 4px rgba(0,0,0,.08);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 0;
    }
    .leaflet-popup-content { margin: 14px 16px; min-width: 180px; }
    .leaflet-popup-tip     { background: white; }
    .leaflet-popup-close-button { color: #64748b !important; font-size: 18px !important; }

    /* ── Popup content ───────────────────────────────────── */
    .popup-name   { font-size: 14px; font-weight: 700; color: #0f172a; margin-bottom: 2px; line-height: 1.3; }
    .popup-name-link { color: #1d4ed8; text-decoration: none; }
    .popup-name-link:hover { text-decoration: underline; }
    .popup-sport  { font-size: 10px; font-weight: 600; text-transform: uppercase;
                    letter-spacing: .08em; color: #94a3b8; margin-bottom: 6px; }
    .popup-access { font-size: 12px; margin-bottom: 8px; font-weight: 500; }
    .popup-details { font-size: 12px; line-height: 1.8; color: #475569; }
    .popup-details b { color: #334155; }
    .popup-details a { color: #4f46e5; text-decoration: none; }
    .popup-details a:hover { text-decoration: underline; }
    .popup-note {
      font-size: 11px; color: #64748b; margin-top: 7px;
      padding: 6px 8px; background: #f8fafc;
      border-left: 3px solid #c7d2fe;
      border-radius: 0 6px 6px 0; line-height: 1.5;
    }
    .popup-dblclick { font-size: 10px; color: #94a3b8; margin-top: 7px; }
  </style>
</head>
<body>

<div id="map"></div>

<!-- Side panel -->
<div id="panel">
  <div id="panel-header">
    <span class="header-icon">🎾</span>
    <h2>NYC Courts</h2>
    <p>Manhattan · Brooklyn · Queens · Bronx</p>
  </div>
  <div id="panel-body">

    <div class="section-label">Drive Time Filter</div>
    <div id="address-wrap">
      <input id="address-input" type="text" placeholder="e.g. 350 W 42nd St, NY">
      <div class="time-pills">
        <button class="time-pill" data-min="10">10 min</button>
        <button class="time-pill" data-min="15">15 min</button>
        <button class="time-pill active" data-min="20">20 min</button>
        <button class="time-pill" data-min="30">30 min</button>
      </div>
      <button id="address-btn">Filter by drive time</button>
      <div id="drive-active-banner"></div>
      <span id="address-clear" onclick="clearDriveFilter()">✕ Remove filter</span>
      <div id="address-status"></div>
    </div>

    <div class="section-label">Sport</div>
    <div class="filter-row">
      <input type="checkbox" id="f-tennis" checked>
      <label for="f-tennis"><div class="swatch" style="background:#3b82f6;border:2px solid #1d4ed8"></div>Tennis</label>
    </div>
    <div class="filter-row">
      <input type="checkbox" id="f-padel" checked>
      <label for="f-padel"><div class="swatch" style="background:#f97316;border:2px solid #c2410c"></div>Padel</label>
    </div>

    <div class="section-label">Access</div>
    <div class="filter-row">
      <input type="checkbox" id="f-public" checked>
      <label for="f-public"><div class="swatch" style="background:#22c55e"></div>First come, first serve</label>
    </div>
    <div class="filter-row">
      <input type="checkbox" id="f-reservable" checked>
      <label for="f-reservable"><div class="swatch" style="background:#eab308"></div>Reservable / permit</label>
    </div>
    <div class="filter-row">
      <input type="checkbox" id="f-private" checked>
      <label for="f-private"><div class="swatch" style="background:#a855f7"></div>Membership only</label>
    </div>
    <div class="filter-row">
      <input type="checkbox" id="f-unknown" checked>
      <label for="f-unknown"><div class="swatch" style="background:#94a3b8"></div>Unknown access</label>
    </div>
    <div class="filter-row">
      <input type="checkbox" id="f-residential" checked>
      <label for="f-residential"><div class="swatch" style="background:#0ea5e9"></div>Private residential building</label>
    </div>

    <div class="section-label">Surface</div>
    <div class="filter-row">
      <input type="checkbox" id="f-clay" checked>
      <label for="f-clay"><div class="swatch" style="background:#c2410c"></div>Clay</label>
    </div>
    <div class="filter-row">
      <input type="checkbox" id="f-hard" checked>
      <label for="f-hard"><div class="swatch" style="background:#64748b"></div>Hard</label>
    </div>
    <div class="filter-row">
      <input type="checkbox" id="f-grass" checked>
      <label for="f-grass"><div class="swatch" style="background:#16a34a"></div>Grass</label>
    </div>
    <div class="filter-row">
      <input type="checkbox" id="f-surface-other" checked>
      <label for="f-surface-other"><div class="swatch" style="background:#cbd5e1"></div>Other / Unknown</label>
    </div>

    <div class="section-label">Location</div>
    <div class="filter-row">
      <input type="checkbox" id="f-outdoor" checked>
      <label for="f-outdoor"><div class="swatch" style="background:#0d9488"></div>Outdoor</label>
    </div>
    <div class="filter-row">
      <input type="checkbox" id="f-indoor" checked>
      <label for="f-indoor"><div class="swatch" style="background:#7c3aed"></div>Indoor</label>
    </div>

    <div class="divider"></div>

    <div id="stats-grid">
      <div class="stat-card" id="stat-total">
        <div class="stat-val" id="s-total">—</div>
        <div class="stat-lbl">Facilities shown</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="s-tennis">—</div>
        <div class="stat-lbl">Tennis</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="s-padel">—</div>
        <div class="stat-lbl">Padel</div>
      </div>
    </div>
    <div id="access-stats"></div>

    <div id="hint">💡 Click a marker for details.<br>Double-click to open its website.</div>
  </div>
</div>

<!-- Zoom controls -->
<div id="zoom-controls">
  <button class="zoom-btn" id="zoom-in"  title="Zoom in">+</button>
  <button class="zoom-btn" id="zoom-out" title="Zoom out">−</button>
</div>

<!-- Loading overlay -->
<div id="loading">
  <div class="spinner"></div>
  <p>Loading courts…</p>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// CONSTANTS & OVERRIDES
// ═══════════════════════════════════════════════════════════════════

const OVERRIDES = [
  // FALSE POSITIVES / CLOSED
  { match: 'tennis lab',               remove: true },  // stringing shop, not a court
  { match: 'racquet and tennis club',  remove: true },

  { match: 'court 12', remove: true },
  { match: 'court 13', remove: true },
  { match: 'court 14', remove: true },
  { match: 'court 15', remove: true },
  // PRIVATE
  // RESIDENTIAL — identified via ID_OVERRIDES
  { match: 'sessanta',              access: 'residential', website: 'https://sessanta60.com/the-amenities-sessanta/', note: '60 W 60th St. Private rooftop tennis court. Residents only.' },
  { match: 'hunter college brookdale', access: 'private', website: 'https://www.huntercollegeathletics.com', note: '425 E 25th St. For Hunter College students and guests only.' },

  { match: 'padel haus',         access: 'reservable', website: 'https://padel.haus',               note: 'Book online at padel.haus' },

const GENERIC_NAMES = new Set([
  'tennis court','tennis courts','padel court','padel courts',
  'court','courts','tennis','padel','pitch',
]);

// OSM element IDs to exclude entirely (false positives confirmed not to be courts)
const BLOCKED_IDS = new Set([

  165434076, 1079338352, 1079338353,           // E 14th / Ave C area (false positive)
  1103888442, 1103888443, 1103888444, 1365375888, // E 21st / E 25th (false positives)
  888695596,                                   // W 16th Kelly Playground (not a court)
  1341079142, 1341079143, 1341079144,          // Reserve Padel duplicate unnamed nodes
  413654400, 413654401, 413654402, 413654403,
  413654404, 413654405, 413654406,             // Individual numbered courts 1-7 in Jamaica, Queens
  830193995,                                   // "Tennis Half" — practice half-court, not a full court
  // Central Park area false positives / mystery clusters
  429887427, 429887430,                        // ~79th St/5th Ave — inside CP, no real courts there
  1183846661, 1183846662, 1183846663,          // ~86th St/CPW — the "86th Transverse" mystery courts
  // Pier 42 — replaced by single curated entry to avoid named-cluster grid-cell split
  1023668014, 1149028397, 1188665134, 1188665135, 1188665136,
]);

// OSM element IDs → tag overrides (used to name specific unnamed courts)

// ═══════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════

function findOverride(name) {
  if (!name) return null;
  const lower = name.toLowerCase();
  return OVERRIDES.find(o => lower.includes(o.match)) || null;
}

function classifyAccess(tags) {
  const access   = (tags.access     || '').toLowerCase();
  const fee      = (tags.fee        || '').toLowerCase();
  const member   = (tags.membership || '').toLowerCase();
  const operator = (tags.operator   || '').toLowerCase();

  if (operator.includes('nyc parks') ||
      operator.includes('new york city department of parks') ||
      operator.includes('department of parks')) return 'reservable';

  if (access === 'private' || access === 'members' || access === 'customers' ||
      member === 'required' || member === 'yes') return 'private';

  if (access === 'permit') return 'reservable';

  if (tags.reservation || tags.booking ||
      fee === 'yes' || fee === 'seasonal' || fee === 'interval') return 'reservable';

  if (access === 'yes' || access === 'public') return 'public';
  return 'unknown';
}

// ═══════════════════════════════════════════════════════════════════
// CLUSTERING — one dot per complex
// ═══════════════════════════════════════════════════════════════════

function haversineMeters(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
  const Δφ = (lat2-lat1) * Math.PI/180, Δλ = (lon2-lon1) * Math.PI/180;
  const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function mergeTags(base, extra) {
  for (const [k, v] of Object.entries(extra)) { if (v && !base[k]) base[k] = v; }
  return base;
}

function clusterCourts(elements) {
  // ── Step 1: parse raw elements ──────────────────────────────────
  const raw = [];
  for (const el of elements) {
    if (BLOCKED_IDS.has(el.id)) continue;
    const lat = el.lat ?? el.center?.lat;
    const lon = el.lon ?? el.center?.lon;
    if (!lat || !lon) continue;
    const tags  = { ...(el.tags || {}), ...(ID_OVERRIDES[el.id] || {}) };
    const sport = tags.sport;
    if (sport !== 'tennis' && sport !== 'padel') continue;
    const ov = findOverride(tags.name || '');
    if (ov?.remove) continue;
    raw.push({ lat, lon, tags, sport });
  }

  // ── Step 2: group by specific name (within 2 km) ────────────────
  // Named groups prevent nearby same-named courts merging across parks
  const namedGroups = new Map();  // key → { lats[], lons[], tags, sport }
  const unnamed     = [];

  for (const pt of raw) {
    const name  = (pt.tags.name || '').trim();
    const lower = name.toLowerCase();
    if (name && name.length > 4 && !GENERIC_NAMES.has(lower)) {
      // 2 km grid cell keeps same-named courts in different areas separate
      const cell = `${pt.sport}:${lower}:${(pt.lat*50).toFixed(0)},${(pt.lon*50).toFixed(0)}`;
      if (namedGroups.has(cell)) {
        const g = namedGroups.get(cell);
        g.lats.push(pt.lat); g.lons.push(pt.lon);
        mergeTags(g.tags, pt.tags);
      } else {
        namedGroups.set(cell, { lats:[pt.lat], lons:[pt.lon], tags:{ ...pt.tags }, sport:pt.sport });
      }
    } else {
      unnamed.push(pt);
    }
  }

  // ── Step 3: greedy spatial clustering for unnamed (300 m radius) ─
  const unnamedGroups = [];
  const used = new Uint8Array(unnamed.length);

  for (let i = 0; i < unnamed.length; i++) {
    if (used[i]) continue;
    const g = { lats:[unnamed[i].lat], lons:[unnamed[i].lon],
                tags:{ ...unnamed[i].tags }, sport:unnamed[i].sport };
    used[i] = 1;
    // Only merge same-sport courts in the same rough 300 m area
    for (let j = i+1; j < unnamed.length; j++) {
      if (used[j] || unnamed[j].sport !== unnamed[i].sport) continue;
      if (haversineMeters(unnamed[i].lat, unnamed[i].lon,
                          unnamed[j].lat, unnamed[j].lon) < 300) {
        g.lats.push(unnamed[j].lat); g.lons.push(unnamed[j].lon);
        mergeTags(g.tags, unnamed[j].tags);
        used[j] = 1;
      }
    }
    unnamedGroups.push(g);
  }

  // ── Step 4: convert to cluster objects ───────────────────────────
  return [...namedGroups.values(), ...unnamedGroups].map(g => ({
    lat:   g.lats.reduce((a,b)=>a+b,0) / g.lats.length,
    lon:   g.lons.reduce((a,b)=>a+b,0) / g.lons.length,
    tags:  g.tags,
    sport: g.sport,
    count: g.lats.length,
    needsName: !g.tags.name || GENERIC_NAMES.has((g.tags.name||'').toLowerCase()),
  }));
}

// ═══════════════════════════════════════════════════════════════════
// REVERSE GEOCODING — lazy, cached, rate-limited
// ═══════════════════════════════════════════════════════════════════

const geocodeCache = new Map();

async function reverseGeocode(lat, lon) {
  const key = `${lat.toFixed(4)},${lon.toFixed(4)}`;
  if (geocodeCache.has(key)) return geocodeCache.get(key);

  try {
    const resp = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=17`,
      { headers: { 'Accept': 'application/json' } }
    );
    const d = await resp.json();
    // Best name candidates in priority order
    const name =
      d.name ||
      d.address?.park ||
      d.address?.leisure ||
      d.address?.amenity ||
      d.address?.building ||
      (d.address?.road ? d.address.road : null);
    geocodeCache.set(key, name || null);
    return name || null;
  } catch {
    return null;
  }
}

// ═══════════════════════════════════════════════════════════════════
// POPUP
// ═══════════════════════════════════════════════════════════════════

function resolveName(court) {
  const { tags, sport } = court;
  // Use cached geocoded name if available
  if (court.resolvedName) return court.resolvedName;
  // OSM name tag
  if (tags.name && !GENERIC_NAMES.has(tags.name.toLowerCase())) return tags.name;
  // Operator (skip NYC Parks — not a useful facility name)
  if (tags.operator && !tags.operator.toLowerCase().includes('nyc parks')
                    && !tags.operator.toLowerCase().includes('department of parks'))
    return tags.operator;
  // Street address
  if (tags['addr:street'])
    return `${sport === 'padel' ? 'Padel' : 'Tennis'} Courts · ${tags['addr:street']}`;
  // Fallback — will be replaced when user clicks (reverse geocode fires then)
  return sport === 'padel' ? 'Padel Courts' : 'Tennis Courts';
}

function buildPopup(court, accessType, website, note, nameOverride) {
  const { tags, sport, count } = court;
  const name       = nameOverride || resolveName(court);
  const sportLabel = sport.charAt(0).toUpperCase() + sport.slice(1);

  const rows = [];
  const resolvedName = resolveName(court);
  if (tags.operator && tags.operator !== resolvedName
      && !tags.operator.toLowerCase().includes('nyc parks'))
    rows.push(`<b>Operator:</b> ${tags.operator}`);
  if (count > 1)          rows.push(`<b>Courts:</b> ${count}`);
  const surfaceLabel = { clay: 'Clay', hard: 'Hard', grass: 'Grass', other: 'Other / Unknown' };
  const surf = court.surface || normalizeSurface(tags);
  rows.push(`<b>Surface:</b> ${surfaceLabel[surf] || surf}`);
  rows.push(`<b>Location:</b> ${court.indoor ? 'Indoor' : 'Outdoor'}`);
  if (tags.fee && tags.fee !== 'no') rows.push(`<b>Fee:</b> ${tags.fee}`);
  if (tags.opening_hours) rows.push(`<b>Hours:</b> ${tags.opening_hours}`);
  if (tags.phone)         rows.push(`<b>Phone:</b> <a href="tel:${tags.phone}">${tags.phone}</a>`);
  const link = website || tags.website;

  const nameHtml = link
    ? `<a href="${link}" target="_blank" class="popup-name-link">${name}</a>`
    : name;

  return `
    <div class="gm-popup">
      <div class="popup-name">${nameHtml}</div>
      <div class="popup-sport">${sportLabel}</div>
      <div class="popup-access">${ACCESS_LABEL[accessType]}</div>
      ${rows.length ? `<div class="popup-details">${rows.join('<br>')}</div>` : ''}
      ${note ? `<div class="popup-note">ℹ️ ${note}</div>` : ''}
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════════════
// DRIVE TIME (Nominatim geocode + OSRM table)
// ═══════════════════════════════════════════════════════════════════

async function geocodeAddress(address) {
  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(address + ', New York')}&format=json&limit=1&countrycodes=us`;
  const resp = await fetch(url, { headers: { 'Accept': 'application/json' } });
  const data = await resp.json();
  if (!data.length) throw new Error('Address not found — try adding your zip code');
  return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) };
}

async function getDriveTimes(homeLat, homeLon, courts) {
  const BATCH = 99;
  const results = new Array(courts.length).fill(null);
  for (let i = 0; i < courts.length; i += BATCH) {
    const slice  = courts.slice(i, i + BATCH);
    const coords = [
      `${homeLon.toFixed(6)},${homeLat.toFixed(6)}`,
      ...slice.map(c => `${c.lon.toFixed(6)},${c.lat.toFixed(6)}`),
    ].join(';');
    const resp = await fetch(
      `https://router.project-osrm.org/table/v1/driving/${coords}?sources=0&annotations=duration`
    );
    const data = await resp.json();
    data.durations?.[0]?.slice(1).forEach((dur, j) => { results[i + j] = dur; });
  }
  return results;
}

function updateMap() {
  const show = {
    tennis:     document.getElementById('f-tennis').checked,
    padel:      document.getElementById('f-padel').checked,
    public:     document.getElementById('f-public').checked,
    reservable: document.getElementById('f-reservable').checked,
    private:    document.getElementById('f-private').checked,
    unknown:     document.getElementById('f-unknown').checked,
    residential: document.getElementById('f-residential').checked,
    clay:        document.getElementById('f-clay').checked,
    hard:       document.getElementById('f-hard').checked,
    grass:      document.getElementById('f-grass').checked,
    other:      document.getElementById('f-surface-other').checked,
    indoor:     document.getElementById('f-indoor').checked,
    outdoor:    document.getElementById('f-outdoor').checked,
  };

  const counts = { tennis: 0, padel: 0, public: 0, reservable: 0, private: 0, unknown: 0, residential: 0 };

  allCourts.forEach((c, idx) => {
    const visible =
      show[c.sport] &&
      show[c.accessType] &&
      show[c.surface] &&
      show[c.indoor ? 'indoor' : 'outdoor'] &&
      (!driveFilter || driveFilter[idx]);

    if (visible) {
      if (!gmap.hasLayer(c.marker)) c.marker.addTo(gmap);
      counts[c.sport]++; counts[c.accessType]++;
    } else {
      if (gmap.hasLayer(c.marker)) c.marker.remove();
    }
  });

  const total = counts.tennis + counts.padel;
  document.getElementById('s-total').textContent  = total;
  document.getElementById('s-tennis').textContent = counts.tennis;
  document.getElementById('s-padel').textContent  = counts.padel;
  document.getElementById('access-stats').innerHTML = `
    <span style="color:#22c55e">●</span> FCFS: <b>${counts.public}</b> &nbsp;
    <span style="color:#eab308">●</span> Reservable: <b>${counts.reservable}</b><br>
    <span style="color:#a855f7">●</span> Members only: <b>${counts.private}</b> &nbsp;
    <span style="color:#94a3b8">●</span> Unknown: <b>${counts.unknown}</b>
  `;
}

// ═══════════════════════════════════════════════════════════════════
// DRIVE TIME UI
// ═══════════════════════════════════════════════════════════════════

async function applyDriveFilter() {
  const address = document.getElementById('address-input').value.trim();
  if (!address) return;

  const btn    = document.getElementById('address-btn');
  const status = document.getElementById('address-status');

  btn.disabled = true;
  btn.textContent = 'Calculating…';
  status.textContent = 'Geocoding address…';
  status.className = '';

  try {
    const { lat, lon } = await geocodeAddress(address);
    status.textContent = 'Fetching drive times…';

    const times = await getDriveTimes(lat, lon, allCourts);
    driveFilter = times.map(t => t !== null && t <= driveMinutes * 60);

    const within = driveFilter.filter(Boolean).length;
    status.textContent = `${within} facilit${within !== 1 ? 'ies' : 'y'} within ${driveMinutes} min`;
    status.className = 'ok';
    document.getElementById('address-clear').style.display = 'block';
    const banner = document.getElementById('drive-active-banner');
    const shortAddr = address.length > 28 ? address.slice(0, 28) + '…' : address;
    banner.textContent = `Within ${driveMinutes} min of ${shortAddr}`;
    banner.style.display = 'block';

    // Home marker
    if (window._homeMarker) window._homeMarker.remove();
    window._homeMarker = L.circleMarker([lat, lon], {
      radius: 9,
      fillColor: '#6366f1', fillOpacity: 1,
      color: '#4338ca', weight: 2.5,
    }).addTo(gmap);
    window._homeMarker.bindPopup('<b>Your location</b>');
    window._homeMarker.on('click', () => window._homeMarker.openPopup());

    updateMap();
  } catch (err) {
    status.textContent = err.message || 'Error — try again';
    status.className = 'error';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Filter by drive time';
  }
}

function clearDriveFilter() {
  driveFilter = null;
  if (window._homeMarker) { window._homeMarker.remove(); window._homeMarker = null; }
  document.getElementById('address-status').textContent = '';
  document.getElementById('address-status').className = '';
  document.getElementById('address-clear').style.display = 'none';
  document.getElementById('drive-active-banner').style.display = 'none';
  updateMap();
}

// ═══════════════════════════════════════════════════════════════════
// BUILD COURTS
// ═══════════════════════════════════════════════════════════════════

function normalizeSurface(tags) {
  const s = (tags.surface || '').toLowerCase();
  if (s === 'clay') return 'clay';
  if (['hard','asphalt','concrete','acrylic','artificial'].includes(s)) return 'hard';
  if (s === 'grass' || s === 'natural_grass') return 'grass';
  return 'other';
}

function buildCourts(elements) {
  const clusters = clusterCourts(elements);

  for (const court of clusters) {
    const { lat, lon, tags, sport } = court;
    const name = tags.name || '';
    const ov   = findOverride(name);

    const accessType = ov?.access || classifyAccess(tags);
    const website    = ov?.website || tags.website || null;
    const operator   = (tags.operator || '').toLowerCase();
    const note       = ov?.note || (
      (operator.includes('nyc parks') || operator.includes('department of parks'))
        ? 'NYC Parks permit required Apr–Nov. $15/session or $100/season.'
        : null
    );

    court.accessType = accessType;
    court.website    = website;
    court.note       = note;
    court.surface    = normalizeSurface(tags);
    court.indoor     = ov?.indoor ?? (tags.indoor === 'yes' || tags['location:indoor'] === 'yes');

    const marker = L.circleMarker([lat, lon], {
      radius: 8,
      fillColor: ACCESS_COLOR[accessType],
      fillOpacity: 0.9,
      color: SPORT_STROKE[sport],
      weight: 2,
    });

    // Hover → grow marker
    marker.on('mouseover', () => marker.setStyle({ radius: 11, fillOpacity: 1 }));
    marker.on('mouseout',  () => marker.setStyle({ radius: 8,  fillOpacity: 0.9 }));

    // Single click → popup (reverse-geocode unnamed courts on first click)
    marker.on('click', async () => {
      marker.bindPopup(buildPopup(court, accessType, website, note), { maxWidth: 280 }).openPopup();

      // If no good name yet, fetch one in background and refresh popup
      if (court.needsName && !court.resolvedName) {
        const geo = await reverseGeocode(court.lat, court.lon);
        if (geo) {
          court.resolvedName = geo;
          if (marker.isPopupOpen()) {
            marker.setPopupContent(buildPopup(court, accessType, website, note));
          }
        }
      }
    });

    // Double click → open website
    const link = website || tags.website;
    if (link) {
      marker.on('dblclick', (e) => { L.DomEvent.stopPropagation(e); window.open(link, '_blank'); });
    }

    court.marker = marker;
    allCourts.push(court);
  }

  // Add hardcoded curated courts (public parks missing from OSM + residential buildings)
  function addCuratedCourt(entry, accessType) {
    const court = {
      lat: entry.lat, lon: entry.lon,
      tags: { name: entry.name, surface: entry.surface || 'other' },
      sport: entry.sport,
      accessType,
      website: entry.website,
      note: entry.note,
      surface: entry.surface || 'other',
      indoor: entry.indoor ?? false,
      count: 1,
      needsName: false,
      resolvedName: null,
    };
    const marker = L.circleMarker([entry.lat, entry.lon], {
      radius: 8,
      fillColor: ACCESS_COLOR[accessType],
      fillOpacity: 0.9,
      color: SPORT_STROKE[entry.sport],
      weight: 2,
    });
    marker.on('mouseover', () => marker.setStyle({ radius: 11, fillOpacity: 1 }));
    marker.on('mouseout',  () => marker.setStyle({ radius: 8,  fillOpacity: 0.9 }));
    marker.on('click', () => {
      marker.bindPopup(buildPopup(court, accessType, entry.website, entry.note), { maxWidth: 280 }).openPopup();
    });
    if (entry.website) {
      marker.on('dblclick', (e) => { L.DomEvent.stopPropagation(e); window.open(entry.website, '_blank'); });
    }
    court.marker = marker;
    allCourts.push(court);
  }

  for (const entry of PUBLIC_COURTS)      addCuratedCourt(entry, entry.accessType || 'reservable');
  for (const entry of PRIVATE_COURTS)     addCuratedCourt(entry, 'private');
  for (const entry of RESIDENTIAL_COURTS) addCuratedCourt(entry, 'residential');
}

// ═══════════════════════════════════════════════════════════════════
// OVERPASS FETCH
// ═══════════════════════════════════════════════════════════════════

async function fetchFromOverpass() {
  // Primary: static courts.json bundled with the site (fast, CDN-served)
  try {
    const resp = await fetch('courts.json');
    if (resp.ok) return await resp.json();
  } catch {}

  // Fallback: live Overpass API (used locally / if courts.json is missing)
  const bbox  = '40.47,-74.05,40.93,-73.68';
  const query = `
[out:json][timeout:40];
(
  node["sport"="tennis"](${bbox});
  way["sport"="tennis"](${bbox});
  node["sport"="padel"](${bbox});
  way["sport"="padel"](${bbox});
);
out center tags;`.trim();

  const resp = await fetch('https://overpass-api.de/api/interpreter', {
    method: 'POST',
    body: 'data=' + encodeURIComponent(query),
  });
  if (!resp.ok) throw new Error(`Overpass HTTP ${resp.status}`);
  return (await resp.json()).elements;
}

// ═══════════════════════════════════════════════════════════════════
// INIT (called by Google Maps callback)
// ═══════════════════════════════════════════════════════════════════

async function initMap() {
  gmap = L.map('map', {
    center: [40.72, -73.96],
    zoom: 12,
    zoomControl: false,
    doubleClickZoom: false,
  });

  // CartoDB Positron — clean, light tiles with clear borders, no API key needed
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(gmap);

  // Wire up custom zoom buttons
  document.getElementById('zoom-in') .addEventListener('click', () => gmap.setZoom(gmap.getZoom() + 1));
  document.getElementById('zoom-out').addEventListener('click', () => gmap.setZoom(gmap.getZoom() - 1));

  try {
    const elements = await fetchFromOverpass();
    buildCourts(elements);
    document.getElementById('loading').style.display = 'none';

    ['f-tennis','f-padel','f-public','f-reservable','f-private','f-unknown','f-residential',
     'f-clay','f-hard','f-grass','f-surface-other','f-indoor','f-outdoor'].forEach(id =>
      document.getElementById(id).addEventListener('change', updateMap)
    );
    document.querySelectorAll('.time-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        document.querySelectorAll('.time-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        driveMinutes = parseInt(pill.dataset.min, 10);
      });
    });
    document.getElementById('address-btn').addEventListener('click', applyDriveFilter);
    document.getElementById('address-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') applyDriveFilter();
    });

    updateMap();
  } catch (err) {
    document.getElementById('loading').innerHTML =
      `<p style="color:#dc2626;text-align:center;padding:20px">
        Failed to load courts.<br>Check your connection and refresh.<br>
        <small>${err.message}</small>
      </p>`;
  }
}
</script>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>initMap();</script>
